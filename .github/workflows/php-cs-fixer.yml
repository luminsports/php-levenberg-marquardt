name: Run PHP CS Fixer

on:
  push:
    branches: [ 'main', 'develop', 'feature/**', 'release/**' ]
    paths: ['src/**.php']

permissions:
  checks: write
  contents: write
  pull-requests: write

jobs:
  php-cs-fixer:
    name: Run PHP CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Run PHP CS Fixer
        uses: luminsports/github-action-php-cs-fixer@main
