name: Run Tests

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**']
    paths: ['src/**', 'tests/**', 'composer.json', 'composer.lock', 'phpunit.xml', '.github/workflows/tests.yml']
  pull_request:
    branches: [main, develop, 'feature/**', 'release/**']
    paths: ['src/**', 'tests/**', 'composer.json', 'composer.lock', 'phpunit.xml', '.github/workflows/tests.yml']

permissions: {}

jobs:
  tests:
    name: PHP 8.1 - ${{ matrix.stability }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        stability: [prefer-lowest, prefer-stable]

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: xdebug
          tools: composer:v2

      - name: Install Dependencies
        env:
          STABILITY: ${{ matrix.stability }}
        run: composer update --"$STABILITY" --prefer-dist --no-interaction

      - name: Run Tests
        run: composer test -- --coverage-text
