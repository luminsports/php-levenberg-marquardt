name: Run Pest Tests

on:
  push:
    branches: [main, develop, 'feature/**', 'release/**']
    paths: ['src/**', 'tests/**', 'composer.json', 'composer.lock', 'phpunit.xml', '.github/workflows/tests.yml']
  pull_request:
    branches: [main, develop, 'feature/**', 'release/**']
    paths: ['src/**', 'tests/**', 'composer.json', 'composer.lock', 'phpunit.xml', '.github/workflows/tests.yml']

permissions: {}

jobs:
  tests:
    name: Run Pest Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          ini-values: error_reporting=E_ALL
          coverage: xdebug
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run Pest Tests
        run: composer test:coverage -- --ci --parallel
